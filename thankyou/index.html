* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;

  color: #111;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  text-align: center;
  padding: 60px 24px;
  max-width: 480px;
  width: 100%;
}
.logo {
  width: 120px;
  margin-bottom: 36px;
  border-radius: 0;
}
.emoji {
  font-size: 48px;
  margin-bottom: 20px;
  display: block;
}
h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.3;
  margin-bottom: 16px;
}
.desc {
  font-size: 16px;
  color: #555;
  line-height: 1.9;
  margin-bottom: 12px;
}
.email {
  font-size: 15px;
  color: #888;
  margin-bottom: 40px;
}
.email a {
  color: #111;
  text-decoration: underline;
  text-underline-offset: 3px;
}
.btn {
  display: inline-block;
  background: #111;
  color: #fff;
  padding: 15px 40px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  transition: background .15s, transform .15s;
  margin-bottom: 16px;
}
.btn:hover {
  background: #333;
  transform: translateY(-2px);
}

/* ── 카카오 저장 버튼 ── */
.kakao-save-btn {
  display: inline-block;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 15px 40px;
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, transform .15s;
}
.kakao-save-btn:hover {
  background: #333;
  transform: translateY(-2px);
}

@media(max-width: 480px) {
  h1 { font-size: 24px; }
  .btn,
  .kakao-save-btn {
    width: 100%;
    text-align: center;
    padding: 15px 20px;
  }
}
